version: '3.3'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-drivesim_db}
      - POSTGRES_USER=${POSTGRES_USER:-drivesim_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-drivesim_pass}

  web:
    build: .
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=drivesim_licences.settings.production
      - POSTGRES_DB=${POSTGRES_DB:-drivesim_db}
      - POSTGRES_USER=${POSTGRES_USER:-drivesim_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-drivesim_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-django-insecure-prod-key}
      - ALLOWED_HOSTS=api.jausim.com,localhost,127.0.0.1
    ports:
      - "8005:8000"
    depends_on:
      - db

volumes:
  postgres_data:
